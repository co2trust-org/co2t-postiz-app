name: PR Quality

permissions:
  contents: read
  issues: read
  pull-requests: write

on:
  pull_request_target:
    # Only on first open. Including `reopened` re-ran anti-slop and closed PRs again in a loop.
    types: [opened]

jobs:
  anti-slop:
    runs-on: ubuntu-latest
    steps:
      - uses: peakoss/anti-slop@v0
        with:
          # Overall
          max-failures: 3

          # Other
          require-maintainer-can-modify: true
          max-negative-reactions: 3
          require-conventional-title: true

          # Description
          max-emoji-count: 2
          max-code-references: 3
          blocked-terms: "Generated with Claude Code,Generated with Codex"

          # PR Template
          require-pr-template: true
          strict-pr-template-sections: "What kind of change does this PR introduce?,Why was this change needed?,Checklist:"
          optional-pr-template-sections: "Other information:"
          max-additional-pr-template-sections: 2

          # User
          detect-spam-usernames: true
          min-account-age: 30
          max-daily-forks: 5
          min-profile-completeness: 4

          # Exemptions
          exempt-author-association: "OWNER,MEMBER,COLLABORATOR"
          exempt-users: "nevo-david,egelhaus"
          exempt-bots: true

          # Actions
          exempt-label: "exempt"
          # Do not auto-close: agent/Cursor PRs often fail strict template or conventional-title rules.
          close-pr: false
          failure-add-pr-labels: "pr-quality-failed"
          failure-pr-message: "Automated PR quality checks reported issues (see the **PR Quality** workflow run). This PR stays open for review. Maintainers may add the `exempt` label for known-good exceptions."
